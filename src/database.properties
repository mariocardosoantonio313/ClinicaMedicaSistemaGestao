# ============================================================
# Configuração do Banco de Dados MySQL
# Clínica Médica - Sistema de Gestão
# ============================================================

# Host do servidor MySQL (localhost = máquina local)
# Se MySQL está em outro servidor, altere aqui
db.host=localhost

# Porta do MySQL (padrão: 3306)
# Mude apenas se MySQL usa porta diferente
db.port=3306

# Nome do banco de dados
# Deve corresponder ao banco criado pelo script database_setup.sql
db.name=clinica_medica

# Usuário do MySQL
# Padrão: root (mude conforme sua configuração)
db.user=root

# Senha do MySQL
# Por padrão MySQL root não tem senha (deixe vazio)
# Se tiver senha, escreva aqui (ex: db.password=senha123)
db.password=

# SSL: ativar/desativar conexão segura
# false = sem SSL (padrão)
# true = com SSL (se MySQL configurado para isso)
db.ssl=false

# Timezone do MySQL (UTC = padrão universal)
db.timezone=UTC

# Debug: ativar/desativar mensagens de diagnóstico
# true = mostra detalhes de conexão no console
# false = silencioso
debug.enabled=true

# ============================================================
# INSTRUÇÕES DE USO
# ============================================================

# Se o MySQL não está instalado na sua máquina:
# 1. Baixe em: https://dev.mysql.com/downloads/mysql/
# 2. Instale (aceitar configurações padrão)
# 3. Execute: setup_mysql_windows.bat (Windows) ou setup_mysql_linux.sh (Linux/Mac)
#
# Se o MySQL está em outro computador:
# - Altere db.host para o IP ou nome do servidor
# - Verifique se a porta 3306 está aberta
# - Verifique credenciais de acesso
#
# Se tiver problema de conexão:
# - Veja TROUBLESHOOTING.md ou MYSQL_DRIVER_SETUP.md
# - Verifique que o driver JDBC foi adicionado ao classpath
# - Execute: netstat -ano | findstr 3306 (Windows) para confirmar se MySQL está rodando

